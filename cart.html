<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="css/style.css">
    <title>Your Cart | Grand Hotel</title>

</head>
<body>
<!-- Global fixed language switcher -->
<select id="langSwitcher" class="lang-switcher" style="position: fixed; top: 15px; right: 20px; z-index: 10000; padding: 6px 12px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.1); font-weight: bold; color: #333; cursor: pointer; backdrop-filter: blur(5px);">
    <option value="en">English</option>
    <option value="sv">Svenska</option>
    <option value="zh">中文</option>
</select>

<!-- Page Header -->
<header class="page-title" data-i18n="navCart">
    Cart
</header>

<main class="cart-container">

    <!-- Cart Items Display -->
    <div id="cart-content"></div>
    <div class="cart-tip-container" id="cart-tip-container" style="display: none;">
        <span data-i18n="lblTip">Add Tip:</span>
        <div class="tip-options">
            <button class="tip-btn" data-tip="0">0%</button>
            <button class="tip-btn" data-tip="0.1">10%</button>
            <button class="tip-btn" data-tip="0.15">15%</button>
        </div>
    </div>
    
    <!-- Total Price Section -->
    <div class="cart-total" id="cart-total-container" style="display: none;">
        <span data-i18n="lblTotal">Total:</span>
        <span id="cart-total-price">0€</span>
    </div>

    <!-- Checkout Button -->
    <button class="checkout-btn" id="checkout-btn" data-i18n="btnCheckout" style="display: none;">Proceed to Checkout</button>
</main>

<nav class="bottom-nav">
    <a href="main.html">
        <span class="nav-icon">✨</span>
        <span data-i18n="navStart">Start</span>
    </a>
    <a href="menu.html">
        <span class="nav-icon">🍽️</span>
        <span data-i18n="navMenu">Menu</span>
    </a>
    <a href="cart.html" class="current" id="cart-nav-link">
        <span class="nav-icon">🛒</span>
        <span id="cart-badge" data-i18n="navCart">Cart</span>
    </a>
</nav>

<button class="call-service-btn">🛎️</button>

<div id="toast" class="toast"></div>

<!-- Confirmation Popup -->
<div id="confirm-popup" class="confirm-popup">
    <div class="popup-box">
        <h3 data-i18n="checkoutTitle">Checkout</h3>
        <p data-i18n="checkoutConfirmMsg">Are you sure you want to proceed with your order?</p>
        <div class="popup-actions">
            <button id="confirm-no" class="btn-cancel" data-i18n="btnCancel">Cancel</button>
            <button id="confirm-yes" class="btn-confirm" data-i18n="btnConfirm">Confirm</button>
        </div>
    </div>
</div>

<!-- Order Confirmed Popup -->
 <div id="success-screen" class="success-screen">
    <div class="success-box">
        <div class="success-icon">✨</div>
        <h2 data-i18n="orderConfirmedTitle">Order Confirmed</h2>
        <p data-i18n="orderConfirmedMsg">Your food is being prepared with care...</p>
    </div>
</div>

<script src="js/model.js"></script>
<script src="js/view.js"></script>
<script src="js/controller.js"></script>
</body>
</html>
